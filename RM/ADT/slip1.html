<!--Q.2) Write an HTML 5 program for student registration for college admission.--!>
 
<html> 
<body> 
	<h2>Student Registration Form</h2> <br><br>
	Enter Name : 
	<input type="text"> <br>
        Enter Email: 
	<input type="email"> <br>
        Enter Date of Birth: 
	<input type="date"> <br>
        Gender:
	<input type="radio"  value="male"> Male 
	<input type="radio" value="female"> Female <br>
	Preferred Course:
	<select> 
	<option> Engineering </option> 
	<option> Business Administration </option> 
	<option> Computer Science </option> 
	</select> <br>
	<input type="submit" value="Submit"> 
</body> 
</html>
