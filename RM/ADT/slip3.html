<!--Q.2) Write a bootstrap application to display thumbnails of the images  --!>
<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Image Thumbnails with Bootstrap</title> 
<link href=https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css 
rel="stylesheet"> 
</head> 
<body> 
<div class="container mt-5"> 
<h2 class="mb-4">Image Thumbnails</h2> 
<div class="row"> 
<div class="col-md-4"> 
<div class="card"> 
<img src="path/to/image1.jpg" class="card-img-top" alt="Image 1"> 
<div class="card-body"> 
<h5 class="card-title">Image 1</h5> 
<p class="card-text">Description for Image 1.</p> 
</div> 
</div> 
</div> 
<div class="col-md-4"> 
<div class="card"> 
<img src="path/to/image2.jpg" class="card-img-top" alt="Image 2"> 
<div class="card-body"> 
<h5 class="card-title">Image 2</h5> 
<p class="card-text">Description for Image 2.</p> 
</div> 
</div> 
</div> 
<div class="col-md-4"> 
<div class="card"> 
<img src="path/to/image3.jpg" class="card-img-top" alt="Image 3">
<div class="card-body"> 
<h5 class="card-title">Image 3</h5> 
<p class="card-text">Description for Image 3.</p> 
</div> 
</div> 
</div> 
</div> 
</div> 
</body> 
</html>
