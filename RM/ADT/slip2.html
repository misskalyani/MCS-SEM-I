<!--Q.2) Create an HTML5 program for the following input type 
a. Date time 
b. email input type 
c. search input type    --!>


<html> 
<body> 
	<h2>Date Time Input Type</h2> 
        Select a date and time :
	<input type="datetime-local"> <hr> 

	<h2>Email Input Type</h2> 
	Enter your email : 
	<input type="email"> <hr>
 
	<h2>Search Input Type</h2> 
	Search : 
	<input type="search"> 
</body> 
</html>
